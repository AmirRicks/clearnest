<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>ClearNest — A7 Envelope (landscape, 7.24 × 5.27 in)</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  /* ClearNest A7 envelope cover — LANDSCAPE to match the real envelope
     (Pen+Gear A7, 5.27 x 7.24in, held wide → 7.24in across, flap on the long
     top edge). One clean cover: logo + tagline + contact.

     HP Smart Tank Plus 550: NO black/grey (blue + gold ink only), NO
     background fill (the white envelope IS the background). Content is
     centered and compact with a ~1in clear margin all around, so even a
     crooked feed keeps it centred on the envelope face.

     PRINT: Paper = A7 envelope, Orientation = LANDSCAPE, Scale = 100% /
     Actual Size, Background graphics ON. Print on the SMOOTH front side. */
  @page { size: 7.24in 5.27in; margin: 0; }        /* landscape */
  @media print { .screen-only { display:none; } }
  :root { --blue:#0E6F92; --blue-deep:#0A5570; --blue-soft:#2F8AA8; --gold:#C7972F; }
  html, body { margin:0; }                          /* no bg fill — envelope is the background */
  body { font-family:-apple-system,"Helvetica Neue","Inter",system-ui,Arial,sans-serif;
    color:var(--blue); -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  @media screen {
    html,body{ background:#dfe7ea; } body{ padding:30px; display:grid; place-items:center; }
    .env{ background:#fff; box-shadow:0 30px 80px -20px rgba(14,111,146,.35); outline:1px solid rgba(47,138,168,.25); }
  }

  .env {
    width:7.24in; height:5.27in; box-sizing:border-box;
    position:relative; overflow:hidden;
    padding:0.6in 0.9in;                            /* big safe margin on every side */
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center;
  }
  .mark { width:1.15in; height:1.15in; display:block; }
  .name { font-size:46px; font-weight:800; letter-spacing:-0.02em; color:var(--blue); line-height:1; margin-top:0.14in; }
  .strap { font-size:12px; font-weight:600; letter-spacing:0.34em; text-transform:uppercase; color:var(--blue-soft); margin-top:9px; }
  .rule { width:1.2in; height:2px; background:var(--gold); border-radius:2px; margin:0.17in 0; }
  .tag { font-size:21px; font-weight:800; letter-spacing:-0.01em; line-height:1.12; color:var(--blue); }
  .tag .accent { color:var(--gold); }
  .contact { margin-top:0.18in; font-size:13px; font-weight:700; color:var(--blue-soft); letter-spacing:0.02em; }
  .contact .b { color:var(--blue-deep); }

  .screen-only {
    position:fixed; bottom:14px; left:50%; transform:translateX(-50%); padding:8px 14px;
    background:var(--blue-deep); color:#fff; border-radius:999px; font-size:12px; text-align:center;
  }
</style>
</head>
<body>
<div class="env">
  <svg class="mark" viewBox="0 0 64 64" fill="none" aria-label="ClearNest">
    <path d="M8 32 L32 8 L56 32 Q56 60 32 60 Q8 60 8 32 Z" stroke="#0E6F92" stroke-width="4" stroke-linejoin="round"/>
    <circle cx="32" cy="38" r="3.2" fill="#C7972F"/>
  </svg>
  <div class="name">ClearNest</div>
  <div class="strap">Cleaning Services</div>
  <div class="rule"></div>
  <div class="tag">A Cleaner Home. <span class="accent">A Clearer Mind.</span></div>
  <div class="contact"><span class="b">clearnest.services</span> &nbsp;&middot;&nbsp; (801) 441-0726</div>
</div>
<div class="screen-only">Paper: A7 envelope · Orientation: LANDSCAPE · 100% / Actual Size · Backgrounds ON · print on the smooth front side</div>
</body>
</html>
