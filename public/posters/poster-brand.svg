<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdfdfb"/>
      <stop offset="100%" stop-color="#f6f6f1"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2b88a8"/>
      <stop offset="50%" stop-color="#1b556c"/>
      <stop offset="100%" stop-color="#c9a96e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="url(#bg)"/>

  <!-- Decorative -->
  <circle cx="540" cy="300" r="450" fill="#2b88a8" opacity="0.02"/>

  <!-- Top accent -->
  <rect x="0" y="0" width="1080" height="8" fill="url(#accentBar)"/>

  <!-- Logo -->
  <g transform="translate(80, 60)">
    <g transform="scale(0.6)">
      <path d="M0 60 L40 0 L80 60 Z" fill="none" stroke="#1b556c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M10 60 Q10 95 40 100 Q70 95 70 60" fill="none" stroke="#1b556c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="40" cy="85" r="4" fill="#c9a96e"/>
    </g>
    <text x="60" y="30" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#1a1d22">ClearNest</text>
    <text x="60" y="52" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#4a5159" letter-spacing="3">CLEANING SERVICES</text>
  </g>

  <!-- Headline -->
  <text x="80" y="380" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#2b88a8" letter-spacing="3">SALT LAKE COUNTY</text>

  <text x="80" y="450" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#1a1d22" line-height="1.05">
    <tspan x="80" dy="0">We Clean</tspan>
    <tspan x="80" dy="75">Homes, Not</tspan>
    <tspan x="80" dy="75">Corners.</tspan>
  </text>

  <text x="80" y="700" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="24" fill="#4a5159" line-height="1.6">
    <tspan x="80" dy="0">Local, insured, and built for</tspan>
    <tspan x="80" dy="40">homes like yours. Servicing all</tspan>
    <tspan x="80" dy="40">of Salt Lake County.</tspan>
  </text>

  <!-- Stats row -->
  <g transform="translate(80, 860)">
    <rect x="0" y="0" width="280" height="180" rx="24" fill="#ffffff" stroke="#d4d8dc" stroke-width="1"/>
    <text x="140" y="55" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#2b88a8" text-anchor="middle">5.0</text>
    <text x="140" y="85" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="16" fill="#4a5159" text-anchor="middle">★★★★★</text>
    <text x="140" y="120" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#1a1d22" text-anchor="middle">Average Rating</text>

    <rect x="320" y="0" width="280" height="180" rx="24" fill="#ffffff" stroke="#d4d8dc" stroke-width="1"/>
    <text x="460" y="55" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#2b88a8" text-anchor="middle">300+</text>
    <text x="460" y="90" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="16" fill="#4a5159" text-anchor="middle">✓ Insured &amp; Bonded</text>
    <text x="460" y="120" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#1a1d22" text-anchor="middle">Homes Served</text>

    <rect x="640" y="0" width="280" height="180" rx="24" fill="#ffffff" stroke="#d4d8dc" stroke-width="1"/>
    <text x="780" y="55" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#2b88a8" text-anchor="middle">60</text>
    <text x="780" y="90" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="16" fill="#4a5159" text-anchor="middle">✓ Eco &amp; Pet-Safe</text>
    <text x="780" y="120" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#1a1d22" text-anchor="middle">Point Checklist</text>
  </g>

  <!-- Service buttons -->
  <g transform="translate(80, 1120)">
    <text x="0" y="0" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#2b88a8" letter-spacing="2">OUR SERVICES</text>

    <g transform="translate(0, 30)">
      <rect x="0" y="0" width="920" height="60" rx="16" fill="#ffffff" stroke="#d4d8dc" stroke-width="1"/>
      <text x="460" y="37" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#1a1d22" text-anchor="middle">Standard Cleaning — from $110</text>
    </g>
    <g transform="translate(0, 100)">
      <rect x="0" y="0" width="920" height="60" rx="16" fill="#ffffff" stroke="#d4d8dc" stroke-width="1"/>
      <text x="460" y="37" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#1a1d22" text-anchor="middle">Deep Cleaning — from $195</text>
    </g>
    <g transform="translate(0, 170)">
      <rect x="0" y="0" width="920" height="60" rx="16" fill="#ffffff" stroke="#d4d8dc" stroke-width="1"/>
      <text x="460" y="37" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#1a1d22" text-anchor="middle">Move-In / Move-Out — from $245</text>
    </g>
    <g transform="translate(0, 240)">
      <rect x="0" y="0" width="920" height="60" rx="16" fill="#ffffff" stroke="#d4d8dc" stroke-width="1"/>
      <text x="460" y="37" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#1a1d22" text-anchor="middle">Airbnb Turnover — from $125</text>
    </g>
  </g>

  <!-- CTA -->
  <rect x="80" y="1480" width="920" height="80" rx="40" fill="#1a1d22"/>
  <text x="540" y="1532" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle">Get Your Instant Quote →</text>

  <!-- Footer -->
  <g transform="translate(80, 1630)">
    <text x="0" y="0" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#1a1d22">ClearNest Cleaning Services</text>
    <text x="0" y="30" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="16" fill="#4a5159">clearnest.services</text>
    <text x="0" y="55" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="16" fill="#4a5159">(801) 441-0726</text>
  </g>

  <!-- Bottom accent -->
  <rect x="0" y="1912" width="1080" height="8" fill="url(#accentBar)"/>
</svg>