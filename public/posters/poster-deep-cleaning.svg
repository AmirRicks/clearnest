<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b556c"/>
      <stop offset="100%" stop-color="#1a1d22"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a96e"/>
      <stop offset="100%" stop-color="#2b88a8"/>
    </linearGradient>
    <linearGradient id="ctaGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f6f6f1"/>
    </linearGradient>
  </defs>

  <!-- Dark Background -->
  <rect width="1080" height="1920" fill="url(#bg)"/>

  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="250" fill="#2b88a8" opacity="0.06"/>
  <circle cx="980" cy="1800" r="300" fill="#c9a96e" opacity="0.05"/>
  <line x1="540" y1="160" x2="540" y2="1760" stroke="#ffffff" stroke-width="0.5" opacity="0.06"/>

  <!-- Top accent -->
  <rect x="0" y="0" width="1080" height="8" fill="url(#accentBar)"/>

  <!-- Logo (inverted for dark bg) -->
  <g transform="translate(80, 60)">
    <g transform="scale(0.6)">
      <path d="M0 60 L40 0 L80 60 Z" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M10 60 Q10 95 40 100 Q70 95 70 60" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="40" cy="85" r="4" fill="#c9a96e"/>
    </g>
    <text x="60" y="30" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#ffffff">ClearNest</text>
    <text x="60" y="52" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#aed6e7" letter-spacing="3">CLEANING SERVICES</text>
  </g>

  <!-- Badge -->
  <g transform="translate(80, 200)">
    <rect x="0" y="0" width="200" height="44" rx="22" fill="#c9a96e"/>
    <text x="100" y="28" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1a1d22" text-anchor="middle">FROM $195</text>
  </g>

  <!-- Headline -->
  <text x="80" y="440" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#ffffff" line-height="1.1">
    <tspan x="80" dy="0">Deep</tspan>
    <tspan x="80" dy="80">Cleaning</tspan>
  </text>

  <text x="80" y="650" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="24" fill="#aed6e7" line-height="1.6">
    <tspan x="80" dy="0">The top-to-bottom reset your home</tspan>
    <tspan x="80" dy="40">needs. Baseboards, cabinets,</tspan>
    <tspan x="80" dy="40">blinds — we get it all.</tspan>
  </text>

  <!-- What's included -->
  <g transform="translate(80, 780)">
    <text x="0" y="0" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#c9a96e" letter-spacing="2">WHAT'S INCLUDED</text>

    <g transform="translate(0, 50)">
      <circle cx="8" cy="8" r="8" fill="#c9a96e" opacity="0.3"/>
      <circle cx="8" cy="8" r="3" fill="#c9a96e"/>
      <text x="28" y="14" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#ffffff">Everything in Standard, plus:</text>
    </g>
    <g transform="translate(0, 110)">
      <circle cx="8" cy="8" r="8" fill="#2b88a8" opacity="0.3"/>
      <circle cx="8" cy="8" r="3" fill="#2b88a8"/>
      <text x="28" y="14" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#ffffff">Baseboards, door frames, vents</text>
    </g>
    <g transform="translate(0, 170)">
      <circle cx="8" cy="8" r="8" fill="#2b88a8" opacity="0.3"/>
      <circle cx="8" cy="8" r="3" fill="#2b88a8"/>
      <text x="28" y="14" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#ffffff">Inside cabinets &amp; drawers</text>
    </g>
    <g transform="translate(0, 230)">
      <circle cx="8" cy="8" r="8" fill="#2b88a8" opacity="0.3"/>
      <circle cx="8" cy="8" r="3" fill="#2b88a8"/>
      <text x="28" y="14" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#ffffff">Inside microwave &amp; oven exterior</text>
    </g>
    <g transform="translate(0, 290)">
      <circle cx="8" cy="8" r="8" fill="#2b88a8" opacity="0.3"/>
      <circle cx="8" cy="8" r="3" fill="#2b88a8"/>
      <text x="28" y="14" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#ffffff">Blinds, light switches, window sills</text>
    </g>
    <g transform="translate(0, 350)">
      <circle cx="8" cy="8" r="8" fill="#2b88a8" opacity="0.3"/>
      <circle cx="8" cy="8" r="3" fill="#2b88a8"/>
      <text x="28" y="14" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#ffffff">Behind furniture &amp; under beds</text>
    </g>
  </g>

  <!-- Testimonial -->
  <g transform="translate(80, 1260)">
    <rect x="0" y="0" width="920" height="100" rx="16" fill="#ffffff" opacity="0.06"/>
    <text x="460" y="40" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="16" font-style="italic" fill="#aed6e7" text-anchor="middle">"Best deep clean we've ever had. Worth every penny."</text>
    <text x="460" y="70" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="14" fill="#7ebed8" text-anchor="middle">— Sarah M., Holladay</text>
  </g>

  <!-- CTA -->
  <rect x="80" y="1420" width="920" height="80" rx="40" fill="url(#ctaGrad)"/>
  <text x="540" y="1472" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#1a1d22" text-anchor="middle">Book Deep Cleaning →</text>

  <!-- Footer -->
  <g transform="translate(80, 1560)">
    <text x="0" y="0" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="16" fill="#7ebed8">clearnest.services · (801) 441-0726</text>
  </g>

  <!-- Bottom accent -->
  <rect x="0" y="1912" width="1080" height="8" fill="url(#accentBar)"/>
</svg>