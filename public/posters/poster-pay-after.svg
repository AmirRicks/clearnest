<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6f6f1"/>
      <stop offset="100%" stop-color="#fdfdfb"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a96e"/>
      <stop offset="100%" stop-color="#2b88a8"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f6f6f1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="url(#bg)"/>

  <!-- Decorative shapes -->
  <circle cx="1080" cy="0" r="350" fill="#2b88a8" opacity="0.03"/>
  <circle cx="0" cy="1920" r="400" fill="#c9a96e" opacity="0.04"/>
  <circle cx="540" cy="960" r="200" fill="#1b556c" opacity="0.02"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1080" height="8" fill="url(#accentBar)"/>

  <!-- Logo -->
  <g transform="translate(80, 60)">
    <g transform="scale(0.6)">
      <path d="M0 60 L40 0 L80 60 Z" fill="none" stroke="#1b556c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M10 60 Q10 95 40 100 Q70 95 70 60" fill="none" stroke="#1b556c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="40" cy="85" r="4" fill="#c9a96e"/>
    </g>
    <text x="60" y="30" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#1a1d22">ClearNest</text>
    <text x="60" y="52" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#4a5159" letter-spacing="3">CLEANING SERVICES</text>
  </g>

  <!-- Headline -->
  <text x="80" y="420" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#c9a96e" letter-spacing="3">NO UPFRONT PAYMENT</text>

  <text x="80" y="490" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#1a1d22" line-height="1.1">
    <tspan x="80" dy="0">Pay After</tspan>
    <tspan x="80" dy="80">the Clean.</tspan>
    <tspan x="80" dy="80">Simple.</tspan>
  </text>

  <!-- Subtext -->
  <text x="80" y="740" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="24" fill="#4a5159" line-height="1.6">
    <tspan x="80" dy="0">No deposits. No surprise fees.</tspan>
    <tspan x="80" dy="40">We clean your home, you</tspan>
    <tspan x="80" dy="40">inspect it, then you pay.</tspan>
    <tspan x="80" dy="40">That&apos;s the ClearNest promise.</tspan>
  </text>

  <!-- Value proposition cards -->
  <g transform="translate(80, 880)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="920" height="100" rx="20" fill="url(#cardGrad)" stroke="#d4d8dc" stroke-width="1"/>
    <text x="30" y="40" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#2b88a8">$0</text>
    <text x="75" y="40" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#1a1d22">Upfront deposit</text>
    <text x="30" y="72" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="16" fill="#4a5159">No card on file required</text>

    <!-- Card 2 -->
    <rect x="0" y="130" width="920" height="100" rx="20" fill="url(#cardGrad)" stroke="#d4d8dc" stroke-width="1"/>
    <text x="30" y="170" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#2b88a8">✓</text>
    <text x="75" y="170" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#1a1d22">Inspect before you pay</text>
    <text x="30" y="202" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="16" fill="#4a5159">Walk through with your cleaner</text>

    <!-- Card 3 -->
    <rect x="0" y="260" width="920" height="100" rx="20" fill="url(#cardGrad)" stroke="#d4d8dc" stroke-width="1"/>
    <text x="30" y="300" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#2b88a8">💳</text>
    <text x="75" y="300" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#1a1d22">Apple Pay, Google Pay, Card</text>
    <text x="30" y="332" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="16" fill="#4a5159">Pay however is easiest for you</text>
  </g>

  <!-- CTA -->
  <rect x="80" y="1320" width="920" height="80" rx="40" fill="#1a1d22"/>
  <text x="540" y="1372" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle">Schedule a Free Quote →</text>

  <!-- Trust -->
  <g transform="translate(80, 1470)">
    <text x="460" y="0" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="16" fill="#4a5159" text-anchor="middle">Insured · Bonded · Local · Family-Owned</text>
  </g>

  <!-- Footer -->
  <g transform="translate(80, 1560)">
    <text x="0" y="0" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#1a1d22">ClearNest Cleaning Services</text>
    <text x="0" y="30" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="16" fill="#4a5159">clearnest.services</text>
    <text x="0" y="55" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="16" fill="#4a5159">(801) 441-0726</text>
  </g>

  <!-- Bottom accent -->
  <rect x="0" y="1912" width="1080" height="8" fill="url(#accentBar)"/>
</svg>